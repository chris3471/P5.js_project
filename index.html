<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 작품 포트폴리오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c10;
      --panel: #0d1318;
      --border: #1a3a4a;
      --accent: #00d4ff;
      --accent2: #ff4455;
      --accent3: #ffcc00;
      --text: #c8dce8;
      --text-dim: #4a6a7a;
      --glow: 0 0 18px rgba(0, 212, 255, 0.4);
      --glow2: 0 0 18px rgba(255, 68, 85, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 그리드 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* 상단 글로우 라인 */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
      z-index: 10;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 60px;
    }

    /* 헤더 */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }

    .header-tag {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .header-sub {
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      font-weight: 300;
    }

    /* 구분선 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeDown 0.8s 0.2s ease both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .divider-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: var(--glow);
    }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* 카드 */
    .card {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--panel);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 0.7s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--glow), 0 8px 32px rgba(0,0,0,0.5);
    }

    /* 카드 상단 바 */
    .card-bar {
      height: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .card:nth-child(1) .card-bar,
    .card:nth-child(4) .card-bar { background: linear-gradient(90deg, var(--accent2), transparent); }
    .card:nth-child(2) .card-bar,
    .card:nth-child(3) .card-bar { background: linear-gradient(90deg, var(--accent), transparent); }

    /* iframe 래퍼 */
    .iframe-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #05080b;
    }

    .iframe-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      transform: scale(0.667);
      pointer-events: none;
    }

    /* 카드 정보 */
    .card-info {
      padding: 10px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .card-badge {
      font-size: 0.6rem;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .badge-static {
      background: rgba(255,68,85,0.12);
      color: var(--accent2);
      border: 1px solid rgba(255,68,85,0.3);
    }
    .badge-dynamic {
      background: rgba(0,212,255,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.3);
    }

    /* 카드 번호 오버레이 */
    .card-num {
      position: absolute;
      top: 8px; left: 10px;
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.15em;
      z-index: 2;
      pointer-events: none;
    }

    /* 푸터 */
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      animation: fadeUp 0.8s 0.5s ease both;
    }
    .footer span {
      color: var(--accent);
      font-family: 'Orbitron', monospace;
    }

    /* 애니메이션 */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 스캔라인 효과 */
    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="scanline"></div>

  <div class="container">

    <header class="header">
      <p class="header-tag">// p5.js visual portfolio</p>
      <h1>나의 p5.js 작품</h1>
      <p class="header-sub">Creative Coding · Generative Art · Interactive Design</p>
    </header>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <main class="grid">

      <!-- 과제 1: 정적 드론 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-num">01</div>
        <div class="iframe-wrap">
          <iframe src="project1/index.html" scrolling="no"></iframe>
        </div>
        <div class="card-info">
          <span class="card-title">Drone Strike · Night</span>
          <span class="card-badge badge-static">Static</span>
        </div>
      </div>

      <!-- 과제 4: 동적 드론 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-num">04</div>
        <div class="iframe-wrap">
          <iframe src="project4/index.html" scrolling="no"></iframe>
        </div>
        <div class="card-info">
          <span class="card-title">Drone Strike · Animated</span>
          <span class="card-badge badge-dynamic">Dynamic</span>
        </div>
      </div>

      <!-- 과제 2: 정적 캐릭터 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-num">02</div>
        <div class="iframe-wrap">
          <iframe src="project2/index.html" scrolling="no"></iframe>
        </div>
        <div class="card-info">
          <span class="card-title">Character · Still</span>
          <span class="card-badge badge-static">Static</span>
        </div>
      </div>

      <!-- 과제 3: 동적 캐릭터 -->
      <div class="card">
        <div class="card-bar"></div>
        <div class="card-num">03</div>
        <div class="iframe-wrap">
          <iframe src="project3/index.html" scrolling="no"></iframe>
        </div>
        <div class="card-info">
          <span class="card-title">Character · Interactive</span>
          <span class="card-badge badge-dynamic">Dynamic</span>
        </div>
      </div>

    </main>

    <footer class="footer">
      <span>p5.js</span> · Creative Coding Portfolio &nbsp;·&nbsp; Soongsil Univ.
    </footer>

  </div>
</body>
</html>
